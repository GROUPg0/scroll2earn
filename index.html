<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCROLL2EARN</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
--black: #060608;
--acid: #C8FF00;
--acid2: #A8E000;
--gray: #111114;
--gray2: #1C1C21;
--white: #ECEAE2;
--muted: #555560;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--black);
color:var(--white);
font-family:'DM Sans',sans-serif;
}

/* NAV */
nav{
position:fixed;
top:0;left:0;right:0;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.8);
z-index:10;
}

.nav-logo{
font-family:'Bebas Neue';
color:var(--acid);
font-size:22px;
}

.nav-cta{
background:var(--acid);
padding:10px 20px;
text-decoration:none;
color:black;
font-weight:700;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:120px 20px;
}

.hero h1{
font-family:'Bebas Neue';
font-size:120px;
line-height:0.9;
}

.hero p{
max-width:500px;
color:#888;
margin:20px 0;
}

.btn{
background:var(--acid);
color:black;
padding:15px 30px;
text-decoration:none;
font-weight:700;
display:inline-block;
}

/* SECTION */
.section{
padding:100px 20px;
max-width:1000px;
margin:auto;
text-align:center;
}

.section h2{
font-family:'Bebas Neue';
font-size:60px;
margin-bottom:20px;
}

/* CALCULATOR */
.calc-box{
background:var(--gray);
padding:30px;
margin-top:40px;
}

input{
padding:10px;
width:80px;
text-align:center;
margin:10px;
}

.result{
margin-top:20px;
font-size:22px;
color:var(--acid);
}

/* FOOTER */
footer{
padding:40px;
text-align:center;
color:#666;
}
</style>
</head>

<body>

<nav>
<div class="nav-logo">S2E</div>
<a href="#" class="nav-cta">Beta'ya Katıl</a>
</nav>

<section class="hero">
<h1>SCROLL2EARN</h1>
<p>Zamanını scroll'a harcıyorsun. Biz onu değere çeviriyoruz.</p>
<a href="#" class="btn">Ücretsiz Başla</a>

<p style="margin-top:10px;color:#666;font-size:13px;">
🔥 İlk 10.000 kullanıcıya 2x bonus
</p>
</section>

<section class="section">
<h2>NASIL ÇALIŞIR</h2>
<p>Ekran süreni ölç, coin kazan, gerçek ödüllere dönüştür.</p>
</section>

<section class="section">
<h2>KAZANCINI HESAPLA</h2>

<div class="calc-box">
<input type="number" id="hours" value="3"> saat / gün<br>
<input type="number" id="days" value="30"> gün<br>

<br>
<button class="btn" onclick="calc()">Hesapla</button>

<div class="result" id="result"></div>
</div>
</section>

<footer>
© 2026 Scroll2Earn
</footer>

<script>
function calc(){
let h = document.getElementById("hours").value;
let d = document.getElementById("days").value;

let coins = h * d * 25;
let tl = coins * 0.30;

document.getElementById("result").innerHTML =
coins + " coin ≈ ₺" + Math.round(tl);
}
</script>

</body>
</html>
